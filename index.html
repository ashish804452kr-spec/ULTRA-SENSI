<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA SENSI 200 AI</title>
    <style>
        /* Pura background black aur text white */
        body { margin: 0; font-family: sans-serif; background-color: #000; color: #fff; }
        
        /* Login Screen */
        #login-page { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .login-card { width: 80%; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        
        /* Header Setup */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #111; border-bottom: 2px solid #333; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ff6600; object-fit: cover; }
        .chat-title { color: #fff; font-weight: bold; font-size: 18px; }
        .menu-btn { font-size: 25px; color: #ff6600; cursor: pointer; }

        /* Content Sections */
        .container { padding: 15px; }
        .gun-box { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #ff6600; text-align: center; }
        
        /* Orange Button with Animation */
        .btn-orange { background: #ff6600; color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-orange:active { transform: scale(0.8); background: #fff; }

        /* Hidden Sections */
        #app-content { display: none; }
        
        /* Jarvis Text */
        .jarvis-msg { border: 1px solid #00ebff; padding: 10px; border-radius: 8px; margin-top: 20px; color: #fff; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h2 style="color:#ff6600;">GMAIL LOGIN</h2>
            <input type="email" id="userEmail" placeholder="Enter Gmail">
            <input type="password" id="userPass" placeholder="Enter Password">
            <button class="btn-orange" onclick="startApp()">LOGIN</button>
        </div>
    </div>

    <div id="app-content">
        <div class="top-bar">
            <div class="menu-btn">☰</div>
            <div class="chat-title">CHAT AI</div>
            <img src="IMG_20260501_103729.jpg" class="logo-img">
        </div>

        <div class="container">
            <h3 style="color:#ff6600;">SELECT YOUR GUN (SENSI 200)</h3>
            
            <div class="gun-box">
                <p>DESERT EAGLE / M1014</p>
                <button class="btn-orange" onclick="applySensi('Sensi 200 Applied to Desert Eagle!')">GENERATE</button>
            </div>

            <div class="gun-box">
                <p>UMP / MP40 / AK47</p>
                <button class="btn-orange" onclick="applySensi('Sensi 200 Applied to SMG Guns!')">GENERATE</button>
            </div>

            <div class="gun-box">
                <p>SEARCH MOBILE MODEL</p>
                <input type="text" placeholder="Ex: Vivo Y21, Oppo, iPhone..." style="width:80%;">
                <button class="btn-orange" onclick="applySensi('Mobile Settings Optimized!')">GENERATE</button>
            </div>

            <div class="jarvis-msg">
                <b style="color:#00ebff;">JARVIS:</b> <span>Sushil, all systems ready. Sensitivity boost set to 200%. Click Generate to start.</span>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            let email = document.getElementById('userEmail').value;
            let pass = document.getElementById('userPass').value;
            if(email !== "" && pass !== "") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                alert("Please enter Gmail and Password");
            }
        }

        function applySensi(msg) {
            alert("Loading Video Ad..."); // Ad ka feeling dene ke liye
            setTimeout(() => {
                alert(msg + " | Headshot Rate Increased!");
            }, 1500);
        }
    </script>
</body>
                                                                   </html>
