<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA SENSI PRO - SUSHIL EDITION</title>
    <style>
        /* --- CSS: DARK PREMIUM THEME --- */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        /* 1. Header: No Orange Lines */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a0a0a; border-bottom: 2px solid #ff0000; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .header-left img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ff0000; }
        .jarvis-label { font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #ff0000; }
        .menu-btn { font-size: 32px; color: #ff0000; cursor: pointer; background: none; border: none; }

        /* 2. Main Brand Photo */
        .brand-banner { width: 100%; text-align: center; padding: 10px 0; background: #000; }
        .brand-banner img { width: 90%; border-radius: 15px; border: 2px solid #333; box-shadow: 0 0 20px rgba(255,0,0,0.2); }

        /* 3. Search Sections */
        .search-container { padding: 15px; }
        .search-box { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; margin-top: 8px; }
        .model-list { background: #1a1a1a; border-radius: 8px; margin-top: 5px; max-height: 150px; overflow-y: auto; display: none; }
        .model-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }

        /* 4. New Sensi Page (Orange Style) */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; flex-direction: column; }
        .p-head { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 1px solid #ff6600; }
        .p-body { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }
        
        /* Orange Bars like your photo */
        .sensi-bar { background: linear-gradient(90deg, #ff6600, #ffcc00); height: 25px; border-radius: 5px; margin: 15px 0; position: relative; width: 100%; }
        .bar-label { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #ffcc00; }

        /* 5. Custom Booster */
        .btn-boost { background: #ff0000; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Side Menu */
        .side-menu { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: #080808; transition: 0.4s; z-index: 4000; padding: 30px; border-left: 2px solid #ff0000; }
        .side-menu.active { right: 0; }
        .side-menu a { display: block; color: #fff; text-decoration: none; margin-bottom: 25px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left" onclick="showAbout()">
            <img src="IMG_20260501_103729.jpg">
            <div class="jarvis-label" onclick="event.stopPropagation(); openJarvis()">Jarvis AI</div>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="brand-banner">
        <img src="IMG_20260501_103729.jpg" alt="Sushil Brand">
    </div>

    <div class="search-container">
        <div class="search-box">
            <label style="color: #ff6600; font-weight: bold;">Mobile Brand Search</label>
            <input type="text" id="brandInput" placeholder="Brand Name (e.g. Vivo, iPhone)" oninput="searchBrand()">
            <div id="modelList" class="model-list"></div>
        </div>

        <div class="search-box">
            <label style="color: #ffcc00; font-weight: bold;">Character Skill Search</label>
            <input type="text" id="charInput" placeholder="Character Name (e.g. Alok, Wukong)" oninput="searchChar()">
            <div id="charList" class="model-list"></div>
        </div>

        <div class="search-box" style="border: 1px solid #ff0000;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>120 FPS Boost</span>
                <input type="checkbox" checked style="width: 20px; height: 20px;">
            </div>
            <button class="btn-boost" onclick="openSettings()">OPEN SYSTEM SETTINGS</button>
        </div>
    </div>

    <div id="sensiPage" class="full-page">
        <div class="p-head">
            <span style="color:#ff6600; font-weight:bold;">200% ULTRA SETTINGS</span>
            <button onclick="closeP('sensiPage')" style="background:red; color:#fff; border:none; padding:5px 12px; border-radius:5px;">X</button>
        </div>
        <div class="p-body">
            <h2 id="selectedDevice" style="color: #fff;"></h2>
            
            <div class="bar-label"><span>General</span><span>200</span></div>
            <div class="sensi-bar"></div>
            
            <div class="bar-label"><span>Red Dot</span><span>198</span></div>
            <div class="sensi-bar"></div>
            
            <div class="bar-label"><span>2x Scope</span><span>200</span></div>
            <div class="sensi-bar"></div>

            <div class="bar-label"><span>4x Scope</span><span>195</span></div>
            <div class="sensi-bar"></div>

            <div style="margin-top: 30px;">
                <img src="IMG_20260501_103729.jpg" style="width: 80%; border-radius: 15px; border: 2px solid #ff6600;">
                <p style="color: #555;">Developed by Sushil</p>
            </div>
        </div>
    </div>

    <div id="charPage" class="full-page">
        <div class="p-head">
            <span id="charTitle" style="color:#ffcc00; font-weight:bold;">CHARACTER SKILL</span>
            <button onclick="closeP('charPage')" style="background:red; color:#fff; border:none; padding:5px 12px; border-radius:5px;">X</button>
        </div>
        <div class="p-body" id="charContent" style="text-align: left; line-height: 1.6;">
            </div>
    </div>

    <div id="sideMenu" class="side-menu">
        <h3 style="color:#ff0000;">ULTRA MENU</h3>
        <a href="javascript:void(0)" onclick="showAbout()">About Developer</a>
        <a href="https://www.instagram.com/ultrax111ff">Instagram</a>
        <button class="btn-boost" onclick="toggleMenu()" style="background:#222;">CLOSE</button>
    </div>

    <script>
        const API_KEY = "AIzaSyAHhqfY5Gg0j5qVqsMSn7bPyeoujjtSqhI";

        const models = {
            "Vivo": ["Vivo V25", "Vivo Y21", "Vivo V20", "Vivo T1"],
            "iPhone": ["iPhone 13", "iPhone 14 Pro", "iPhone 11", "iPhone XR"],
            "Redmi": ["Redmi Note 10", "Redmi Note 11", "Redmi 9 Power"],
            "Samsung": ["Samsung S22", "Samsung A53", "Samsung M32"]
        };

        const characters = {
            "Alok": "Drop the Beat: Creates a 5m aura that increases moving speed by 15% and restores 5HP/s for 10s.",
            "Wukong": "Camouflage: Turns into a bush, making it harder for enemies to target you. Cooldown resets after a kill.",
            "Chrono": "Time Turner: Creates an impenetrable force field that blocks 800 damages."
        };

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function closeP(id) { document.getElementById(id).style.display = 'none'; }

        function searchBrand() {
            let input = document.getElementById('brandInput').value;
            let list = document.getElementById('modelList');
            list.innerHTML = "";
            list.style.display = input ? "block" : "none";
            
            for(let brand in models) {
                if(brand.toLowerCase().includes(input.toLowerCase())) {
                    models[brand].forEach(m => {
                        let div = document.createElement('div');
                        div.className = "model-item";
                        div.innerText = m;
                        div.onclick = () => openSensi(m);
                        list.appendChild(div);
                    });
                }
            }
        }

        function searchChar() {
            let input = document.getElementById('charInput').value;
            let list = document.getElementById('charList');
            list.innerHTML = "";
            list.style.display = input ? "block" : "none";

            for(let name in characters) {
                if(name.toLowerCase().includes(input.toLowerCase())) {
                    let div = document.createElement('div');
                    div.className = "model-item";
                    div.innerText = name;
                    div.onclick = () => openChar(name);
                    list.appendChild(div);
                }
            }
        }

        function openSensi(m) {
            document.getElementById('selectedDevice').innerText = m;
            document.getElementById('sensiPage').style.display = 'flex';
            document.getElementById('modelList').style.display = 'none';
        }

        function openChar(name) {
            document.getElementById('charTitle').innerText = name + " SKILL AI";
            document.getElementById('charContent').innerHTML = `<h3 style="color:#ffcc00;">${name} Best Skills:</h3><p>${characters[name]}</p><br><img src="IMG_20260501_103729.jpg" style="width:100%; border-radius:10px;">`;
            document.getElementById('charPage').style.display = 'flex';
            document.getElementById('charList').style.display = 'none';
        }

        function openSettings() {
            alert("Mobile Settings खुल रही है... Free Fire सेलेक्ट करें!");
            window.location.href = "intent:#Intent;action=android.settings.USAGE_ACCESS_SETTINGS;end";
        }

        function showAbout() {
            alert("Sushil - App Developer\n\nMaine iPhone aur Red Magic tech ko milakar ye app banaya hai taaki aapko perfect 200% sensi mil sake.");
        }
        
        function openJarvis() { alert("Jarvis सक्रिय है! (API Key Set)"); }
    </script>
</body>
</html>
