<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI - ULTRA SENSI PRO</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5819410852877244" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; padding-bottom: 70px; }
        
        /* Header & Banner */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #0a0a0a; border-bottom: 2px solid #ff0000; position: sticky; top: 0; z-index: 1000; }
        .header img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #ff0000; }
        .jarvis-title { font-weight: bold; font-size: 22px; text-shadow: 0 0 10px #ff0000; }
        .menu-btn { font-size: 30px; color: #ff0000; background: none; border: none; cursor: pointer; }

        .main-banner { width: 100%; text-align: center; padding: 10px 0; }
        .main-banner img { width: 90%; border-radius: 20px; border: 2px solid #222; }

        /* Search & RAM Row */
        .search-container { padding: 15px; }
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
        input, select { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 14px; }
        select { flex: 0.5; }

        /* Action Buttons */
        .action-btn { background: linear-gradient(45deg, #ff6600, #ff0000); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255,0,0,0.3); }

        /* Full Page Overlays */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        .p-head { display: flex; justify-content: space-between; padding: 15px; background: #0a0a0a; border-bottom: 2px solid #ff6600; }
        .p-body { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }

        /* Animation & Sensi Bars */
        #loader { display: none; margin: 30px auto; width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #ff6600; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bar-wrap { margin-bottom: 15px; text-align: left; }
        .bar-info { display: flex; justify-content: space-between; color: #ffea00; font-weight: bold; margin-bottom: 5px; }
        .bar-outer { background: #222; height: 15px; border-radius: 10px; width: 100%; overflow: hidden; }
        .bar-inner { background: linear-gradient(90deg, #ff6600, #ffea00); height: 100%; width: 0; transition: 2s ease-out; }

        /* Side Menu */
        .side-menu { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: #080808; transition: 0.4s; z-index: 3000; padding: 30px; border-left: 2px solid #ff0000; }
        .side-menu.active { right: 0; }
        .side-menu a { display: block; color: #fff; text-decoration: none; margin-bottom: 20px; font-size: 18px; }

        /* Ad Footer */
        .ad-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; text-align: center; z-index: 5000; padding: 5px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <img src="IMG_20260501_103729.jpg">
        <div class="jarvis-title">Jarvis AI</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="main-banner">
        <img src="IMG_20260501_103729.jpg" onclick="openPage('infoPage')">
    </div>

    <div class="search-container">
        <div class="search-row">
            <input type="text" id="mSearch" placeholder="Enter Mobile Model...">
            <select id="ramSelect">
                <option>2GB</option><option>4GB</option>
                <option selected>6GB</option><option>8GB</option>
                <option>12GB+</option>
            </select>
        </div>

        <button class="action-btn" onclick="startSensiProcess()">GENERATE BEST SENSI</button>
        
        <div style="background:#111; padding:15px; border-radius:12px; margin-top:20px; border-left:4px solid #00f2ff;">
            <p style="margin:0 0 10px; font-size:12px; color:#00f2ff;">JARVIS AI BRAIN (Memory Enabled)</p>
            <div id="chatHistory" style="height:60px; overflow-y:auto; font-size:14px; color:#ccc; margin-bottom:10px;">नमस्ते सुशील! मैं आपका जार्विस हूँ। आप क्या पूछना चाहते हैं?</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chatInput" placeholder="Ask Jarvis anything..." style="padding:8px;">
                <button onclick="askJarvis()" style="background:#00f2ff; border:none; border-radius:8px; padding:0 15px; color:#000; font-weight:bold;">SEND</button>
            </div>
        </div>

        <button class="action-btn" style="background:#222; border:1px solid #ff6600; margin-top:20px;" onclick="openPage('namePage')">100+ STYLISH NAMES</button>
    </div>

    <div id="sensiPage" class="full-page">
        <div class="p-head">
            <span style="color:#ff6600; font-weight:bold;">AI SENSI ANALYZER</span>
            <button onclick="closePage('sensiPage')" style="background:red; color:#fff; border:none; border-radius:5px; padding:5px 12px;">X</button>
        </div>
        <div class="p-body">
            <div id="loader"></div>
            <div id="sensiResult" style="display:none;"></div>
            <div id="sensiFooter" style="display:none; margin-top:30px;">
                <p style="color:#ffea00; font-size:14px;">"Best settings for Headshots! Play 3 matches to master."</p>
                <img src="IMG_20260501_103729.jpg" style="width:90%; border-radius:15px; border:2px solid #ff6600;">
            </div>
        </div>
    </div>

    <div id="namePage" class="full-page">
        <div class="p-head"><span style="color:#ffea00;">NAME STYLES</span><button onclick="closePage('namePage')">X</button></div>
        <div class="p-body">
            <input type="text" id="nameIn" placeholder="Type name..." oninput="generateNicknames()">
            <div id="nameRes" style="margin-top:20px; text-align:left;"></div>
        </div>
    </div>

    <div id="sideMenu" class="side-menu">
        <h3 style="color:red;">MENU</h3>
        <a href="javascript:void(0)" onclick="alert('Developer: Sushil')">App Owner</a>
        <a href="https://www.instagram.com/ultrax111ff" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@ULTRALEGEND111" target="_blank">YouTube Channel</a>
        <button class="action-btn" onclick="toggleMenu()" style="background:#111;">CLOSE</button>
    </div>

    <div class="ad-footer">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-5819410852877244"
             data-ad-slot="2004412073"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        let chatMemory = [];
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function openPage(id) { document.getElementById(id).style.display = 'flex'; }
        function closePage(id) { document.getElementById(id).style.display = 'none'; }

        function askJarvis() {
            let inp = document.getElementById('chatInput');
            let hist = document.getElementById('chatHistory');
            if(!inp.value) return;
            chatMemory.push("You: " + inp.value);
            let reply = "Jarvis: सुशील भाई, " + inp.value + " के बारे में मेरा डेटा कहता है कि यह गेमिंग के लिए बेहतरीन है!";
            chatMemory.push(reply);
            hist.innerHTML = chatMemory.slice(-3).join('<br>');
            inp.value = "";
        }

        function startSensiProcess() {
            let m = document.getElementById('mSearch').value;
            let r = document.getElementById('ramSelect').value;
            if(!m) return alert("कृपया मोबाइल मॉडल लिखें!");
            openPage('sensiPage');
            document.getElementById('loader').style.display = 'block';
            document.getElementById('sensiResult').style.display = 'none';
            document.getElementById('sensiFooter').style.display = 'none';

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                showSensi(m, r);
            }, 3000);
        }

        function showSensi(device, ram) {
            let html = `<h3 style="color:#ff6600;">AI Sensi for ${device} (${ram})</h3>`;
            const types = ["General", "Red Dot", "2x Scope", "4x Scope", "Sniper", "Free Look"];
            types.forEach(t => {
                let v = Math.floor(Math.random() * (200 - 170 + 1)) + 170; // Unique 170-200
                html += `<div class="bar-wrap"><div class="bar-info"><span>${t}</span><span>${v}</span></div>
                         <div class="bar-outer"><div class="bar-inner" style="width:${(v/200)*100}%"></div></div></div>`;
            });
            document.getElementById('sensiResult').innerHTML = html;
            document.getElementById('sensiResult').style.display = 'block';
            document.getElementById('sensiFooter').style.display = 'block';
        }

        function generateNicknames() {
            let n = document.getElementById('nameIn').value;
            let res = document.getElementById('nameRes');
            if(!n) return res.innerHTML = "";
            const s = [`亗 ${n} 亗`, `꧁ ${n} ꧂`, `⚡ ${n} ⚡`, `〆${n}〆`, `『 ${n} 』`, `◥ ${n} ◤`];
            res.innerHTML = s.map(st => `<div style="background:#111; padding:12px; border-radius:8px; margin-bottom:8px; border-left:3px solid #ffea00;">${st}</div>`).join('');
        }
    </script>
</body>
</html>
