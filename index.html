<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA SENSI PRO - SUSHIL MASTER</title>
    <style>
        /* --- CSS: PREMIUM RED MAGIC DESIGN --- */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        /* 1. Header Fix: No Orange Lines */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a0a0a; border-bottom: 2px solid #ff0000; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .header-left img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ff0000; }
        .jarvis-label { font-weight: bold; font-size: 22px; text-shadow: 0 0 10px #ff0000; }
        .menu-btn { font-size: 35px; color: #ff0000; cursor: pointer; background: none; border: none; }

        /* 2. Main Brand Photo */
        .brand-banner { width: 100%; text-align: center; padding: 10px 0; }
        .brand-banner img { width: 92%; border-radius: 15px; border: 2px solid #333; }

        /* 3. Search & Brands */
        .container { padding: 15px; }
        .box { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        
        .brand-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .brand-btn { background: #1a1a1a; color: #fff; border: 1px solid #ff6600; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer; }

        /* 4. Orange Sensi Page (As per your Photo) */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; flex-direction: column; }
        .p-head { display: flex; justify-content: space-between; padding: 15px; background: #111; border-bottom: 2px solid #ff6600; }
        .p-body { flex: 1; padding: 25px; overflow-y: auto; text-align: center; }
        
        /* Orange Gradient Sensi Bars */
        .sensi-item { margin-bottom: 20px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; font-weight: bold; color: #ffcc00; margin-bottom: 8px; }
        .bar-container { background: #222; height: 18px; border-radius: 10px; width: 100%; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #ff6600, #ffea00); height: 100%; border-radius: 10px; transition: 0.5s; }

        /* 5. Buttons */
        .btn-action { background: linear-gradient(45deg, #ff6600, #ff0000); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        /* Side Menu */
        .side-menu { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: #080808; transition: 0.4s; z-index: 4000; padding: 30px; border-left: 2px solid #ff0000; }
        .side-menu.active { right: 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left" onclick="alert('Developed by Sushil')">
            <img src="IMG_20260501_103729.jpg">
            <div class="jarvis-label" onclick="event.stopPropagation(); openJarvis()">Jarvis AI</div>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="brand-banner">
        <img src="IMG_20260501_103729.jpg" alt="Sushil Brand">
    </div>

    <div class="container">
        <div class="box">
            <label style="color:#ff6600; font-weight:bold;">Mobile Brand & Model Search</label>
            <input type="text" id="mSearch" placeholder="Type Brand (e.g. Vivo, Samsung)">
            <div class="brand-grid">
                <div class="brand-btn" onclick="showModels('VIVO')">VIVO</div>
                <div class="brand-btn" onclick="showModels('SAMSUNG')">SAMSUNG</div>
                <div class="brand-btn" onclick="showModels('iPHONE')">iPHONE</div>
                <div class="brand-btn" onclick="showModels('XIAOMI')">XIAOMI</div>
            </div>
            <div id="modelList" style="margin-top:10px; display:none;"></div>
        </div>

        <div class="box">
            <label style="color:#ffea00; font-weight:bold;">Character Skill Search</label>
            <input type="text" id="cSearch" placeholder="Search Character (e.g. Alok, Wukong)">
            <button class="btn-action" style="background:#333; margin-top:10px;" onclick="searchChar()">SEARCH SKILL</button>
        </div>

        <div class="box" style="border: 1px solid #ff0000;">
            <div style="display:flex; justify-content:space-between;">
                <span>120 FPS Ultra Boost</span>
                <input type="checkbox" checked>
            </div>
            <button class="btn-action" onclick="openSystemSet()">OPEN SYSTEM SETTINGS</button>
        </div>
    </div>

    <div id="sensiPage" class="full-page">
        <div class="p-head">
            <span id="targetDevice" style="color:#ff6600; font-weight:bold;"></span>
            <button onclick="closeP('sensiPage')" style="background:red; color:#fff; border:none; padding:5px 12px; border-radius:5px;">X</button>
        </div>
        <div class="p-body">
            <div id="sensiContent"></div>
            <div style="margin-top:40px;">
                <img src="IMG_20260501_103729.jpg" style="width:85%; border-radius:15px; border:2px solid #ff6600;">
                <p style="color:#666;">© SUSHIL GAMING TECH</p>
            </div>
        </div>
    </div>

    <div id="charPage" class="full-page">
        <div class="p-head">
            <span id="charTitle" style="color:#ffea00; font-weight:bold;"></span>
            <button onclick="closeP('charPage')" style="background:red; color:#fff; border:none; padding:5px 12px; border-radius:5px;">X</button>
        </div>
        <div class="p-body" id="charData" style="text-align:left;"></div>
    </div>

    <div id="sideMenu" class="side-menu">
        <h3 style="color:red;">ULTRA MENU</h3>
        <a href="https://www.instagram.com/ultrax111ff" style="color:white; text-decoration:none; display:block; margin:20px 0;">Instagram</a>
        <button class="btn-action" onclick="toggleMenu()" style="background:#222;">CLOSE</button>
    </div>

    <script>
        const KEY = "AIzaSyAHhqfY5Gg0j5qVqsMSn7bPyeoujjtSqhI";

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function closeP(id) { document.getElementById(id).style.display = 'none'; }

        function showModels(brand) {
            let list = document.getElementById('modelList');
            list.style.display = 'block';
            let phones = brand === 'VIVO' ? ['Vivo Y21', 'Vivo V27', 'Vivo T1 5G'] : ['Model 1', 'Model 2', 'Model 3'];
            list.innerHTML = phones.map(p => `<div onclick="openSensi('${p}')" style="padding:10px; border-bottom:1px solid #333;">${p}</div>`).join('');
        }

        function openSensi(device) {
            document.getElementById('targetDevice').innerText = device + " 200% SENSI";
            let types = ["General", "Red Dot", "2x Scope", "4x Scope", "Sniper", "Free Look"];
            let html = "";
            types.forEach(t => {
                let val = Math.floor(Math.random() * (200 - 185 + 1)) + 185; // Unique random sensi
                html += `
                    <div class="sensi-item">
                        <div class="label-row"><span>${t}</span><span>${val}</span></div>
                        <div class="bar-container"><div class="bar-fill" style="width:${(val/200)*100}%"></div></div>
                    </div>`;
            });
            document.getElementById('sensiContent').innerHTML = html;
            document.getElementById('sensiPage').style.display = 'flex';
        }

        function searchChar() {
            let name = document.getElementById('cSearch').value;
            if(!name) return alert("नाम लिखें!");
            document.getElementById('charTitle').innerText = name.toUpperCase() + " SKILL AI";
            document.getElementById('charData').innerHTML = `<h3>Best Skill Combo for ${name}:</h3><p>Use Skill: Level 6 Master.<br>Auto Headshot: Enabled.<br><br><img src="IMG_20260501_103729.jpg" style="width:100%; border-radius:10px;"></p>`;
            document.getElementById('charPage').style.display = 'flex';
        }

        function openSystemSet() {
            alert("सेटिंग्स खुल रही है! Free Fire चुनें।");
            window.location.href = "intent:#Intent;action=android.settings.USAGE_ACCESS_SETTINGS;end";
        }

        function openJarvis() { alert("Jarvis AI Active! Key Set."); }
    </script>
</body>
</html>
